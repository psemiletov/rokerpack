name: CMake build RokerPack VST3 plugins for Windows with Installer

on: [workflow_dispatch]

env:
  BUILD_TYPE: Release
  PLUGINS: "Bronza Grelka Metalluga Charm Tembr Mistral GuitarTuner BassTuner"

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install ninja
        choco install innosetup

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -G "Visual Studio 17 2022" -A x64

    - name: Build all plugins
      run: |
        cmake --build build --config ${{env.BUILD_TYPE}} --parallel

    - name: Prepare plugin files for installer
      run: |
        New-Item -ItemType Directory -Force -Path InstallerFiles
        
        foreach ($plugin in $env:PLUGINS.Split(' ')) {
          $path1 = "build/${plugin}_artefacts/$env:BUILD_TYPE/VST3/${plugin}.vst3"
          $path2 = "build/${plugin}_artefacts/VST3/${plugin}.vst3"
          
          if (Test-Path $path1) {
            Copy-Item -Recurse $path1 "InstallerFiles/"
            Write-Host "Copied $plugin from $path1"
          } elseif (Test-Path $path2) {
            Copy-Item -Recurse $path2 "InstallerFiles/"
            Write-Host "Copied $plugin from $path2"
          } else {
            Write-Host "Warning: $plugin not found"
          }
        }
        
        Write-Host "=== Files in InstallerFiles ==="
        Get-ChildItem -Path InstallerFiles

    - name: Generate dynamic [Files] section
      run: |
        # Копируем базовый скрипт
        Copy-Item "RokerPack.iss" "RokerPack.temp.iss" -Force
        
        # Создаём временный файл с секцией Files
        $filesSection = @()
        $filesSection += "[Files]"
        
        foreach ($plugin in $env:PLUGINS.Split(' ')) {
          $filesSection += "Source: `"InstallerFiles\$plugin.vst3`"; DestDir: `"{app}`"; Flags: recursesubdirs"
        }
        
        # Находим строку "[Files]" в оригинальном скрипте и заменяем
        $content = Get-Content "RokerPack.temp.iss" -Raw
        $newContent = $content -replace '(?m)^\[Files\]\s*$', ($filesSection -join "`r`n")
        
        # Сохраняем финальный скрипт
        $newContent | Out-File "RokerPack.iss" -Encoding ASCII -Force
        
        Write-Host "=== Final RokerPack.iss ==="
        Get-Content "RokerPack.iss"

    - name: Build installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "RokerPack.iss"

    - name: Upload installer as artifact
      uses: actions/upload-artifact@v5
      with:
        name: RokerPackInstaller
        path: RokerPack-Setup.exe
        retention-days: 30
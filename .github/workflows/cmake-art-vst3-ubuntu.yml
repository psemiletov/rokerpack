name: CMake build RokerPack VST3 plugins

on: [workflow_dispatch]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
          sudo apt update
          sudo apt install -y git make g++ cmake pkg-config \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype6-dev libx11-dev \
            libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev mesa-common-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build all plugins
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Debug - list build directory
      run: |
        echo "=== Listing build directory ==="
        ls -la build/
        echo "=== Looking for artefacts ==="
        find build -name "*_artefacts" -type d
        echo "=== Looking for .vst3 ==="
        find build -name "*.vst3" -type d

    - name: Create ZIP
      run: |
        # Создаём папку RokerPack
        mkdir RokerPack
        
        # Копируем плагины (пути будут уточнены после дебага)
        for plugin in Bronza Grelka Metalluga Charm Tembr Mistral GuitarTuner BassTuner; do
          # Пробуем разные возможные пути
          if [ -d "build/${plugin}_artefacts/${BUILD_TYPE}/VST3/${plugin}.vst3" ]; then
            cp -r "build/${plugin}_artefacts/${BUILD_TYPE}/VST3/${plugin}.vst3" RokerPack/
          elif [ -d "build/${plugin}_artefacts/VST3/${plugin}.vst3" ]; then
            cp -r "build/${plugin}_artefacts/VST3/${plugin}.vst3" RokerPack/
          elif [ -d "build/${plugin}_artefacts/${plugin}.vst3" ]; then
            cp -r "build/${plugin}_artefacts/${plugin}.vst3" RokerPack/
          else
            echo "Warning: ${plugin}.vst3 not found"
          fi
        done
        
        # Проверяем, что скопировалось
        echo "=== Copied plugins ==="
        ls -la RokerPack/
        
        # Создаём архив
        zip -r RokerPack.zip RokerPack

    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: RokerPack
        path: RokerPack.zip
        retention-days: 30
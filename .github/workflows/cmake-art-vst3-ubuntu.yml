name: CMake build RokerPack VST3 plugins

on: [workflow_dispatch]

env:
  BUILD_TYPE: Release
  PLUGINS: "Bronza Grelka Metalluga Charm Tembr Mistral GuitarTuner BassTuner"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v5

    - name: Install dependencies
      run: |
          sudo apt update
          sudo apt install -y git make g++ cmake pkg-config \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype6-dev libx11-dev \
            libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev mesa-common-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build all plugins
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Create ZIP
      run: |
        # Создаём папку RokerPack
        mkdir RokerPack
        
        # Копируем все плагины (теперь все имена без пробелов)
        for plugin in ${{env.PLUGINS}}; do
          if [ -d "build/${plugin}_artefacts/VST3/${plugin}.vst3" ]; then
            cp -r "build/${plugin}_artefacts/VST3/${plugin}.vst3" RokerPack/
            echo "Copied $plugin"
          elif [ -d "build/${plugin}_artefacts/Release/VST3/${plugin}.vst3" ]; then
            cp -r "build/${plugin}_artefacts/Release/VST3/${plugin}.vst3" RokerPack/
            echo "Copied $plugin"
          else
            echo "Warning: $plugin not found"
            # Показываем, что есть в директории для отладки
            ls -la "build/${plugin}_artefacts/" 2>/dev/null || echo "No artefacts for $plugin"
          fi
        done
        
        # Проверяем результат
        echo "=== RokerPack contents ==="
        ls -la RokerPack/
        
        # Создаём архив
        zip -r RokerPack.zip RokerPack

    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: RokerPack
        path: RokerPack.zip
        retention-days: 30